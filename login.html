<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Opportunity Hub</title>
<style>

  /* ---------- Basic Reset ---------- */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background-color: #F8FAFC;
    color: #0F172A;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ---------- Header (same style as homepage) ---------- */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 40px;
    background-color: #ffffff;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 20px;
    font-weight: 700;
    text-decoration: none;
    color: #0F172A;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, #2563EB, #7C3AED);
  }

  .back-link {
    color: #2563EB;
    text-decoration: none;
    font-size: 14px;
    font-weight: 600;
  }

  .back-link:hover {
    text-decoration: underline;
  }

  /* ---------- Login Section ---------- */
  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .login-card {
    background-color: #ffffff;
    width: 100%;
    max-width: 400px;
    padding: 40px 32px;
    border-radius: 16px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
  }

  .login-card h1 {
    font-size: 24px;
    margin-bottom: 6px;
    text-align: center;
  }

  .login-card p.subtitle {
    text-align: center;
    color: #64748B;
    font-size: 14px;
    margin-bottom: 28px;
  }

  /* ---------- Form Fields ---------- */
  .field-group {
    margin-bottom: 18px;
  }

  .field-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
    color: #0F172A;
  }

  .field-group input {
    width: 100%;
    padding: 12px 14px;
    font-size: 14px;
    border: 1px solid #E2E8F0;
    border-radius: 10px;
    outline: none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }

  .field-group input:focus {
    border-color: #2563EB;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
  }

  /* ---------- Login Button ---------- */
  .login-btn {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #2563EB, #7C3AED);
    color: #ffffff;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  .login-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(37, 99, 235, 0.4);
  }

  /* ---------- Footer text ---------- */
  .signup-text {
    text-align: center;
    font-size: 14px;
    color: #475569;
    margin-top: 24px;
  }

  .signup-text a {
    color: #14B8A6;
    font-weight: 700;
    text-decoration: none;
  }

  .signup-text a:hover {
    text-decoration: underline;
  }

</style>
</head>
<body>

  <!-- Header -->
  <header>
    <a href="index.html" class="logo">
      <div class="logo-icon"></div>
      Opportunity Hub
    </a>
    <a href="index.html" class="back-link">&larr; Back to Home</a>
  </header>

  <!-- Login Form -->
  <main>
    <div class="login-card">

      <h1>Welcome Back</h1>
      <p class="subtitle">Log in to see opportunities matched for you</p>

      <form action="#" method="POST">

        <div class="field-group">
          <label for="email">Email or Username</label>
          <input type="text" id="email" name="email" placeholder="Enter your email or username" required>
        </div>

        <div class="field-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="login-btn">Log In</button>

      </form>

      <p class="signup-text">
        Don't have an account? <a href="signup.html">Sign up</a>
      </p>

    </div>
  </main>

</body>
</html>
